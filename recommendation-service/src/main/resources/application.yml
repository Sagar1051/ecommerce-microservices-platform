server:
  port: 8086

spring:
  application:
    name: recommendation-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/practice}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092

# Get a free key from https://console.groq.com (no credit card needed).
# Set it as an environment variable named GROQ_API_KEY rather than pasting
# it here, so it never ends up committed to git.
groq:
  api-key: ${GROQ_API_KEY:}
  model: llama-3.1-8b-instant

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

logging:
  level:
    com.ecommerce.recommendation: DEBUG
