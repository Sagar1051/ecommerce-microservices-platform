server:
  port: 8086

spring:
  application:
    name: recommendation-service
  datasource:
    url: jdbc:postgresql://localhost:5432/practice
    username: postgres
    password: root123456789@
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092

# Get a key from https://console.anthropic.com — set it as an environment
# variable named ANTHROPIC_API_KEY rather than pasting it here, so it never
# ends up committed to git.
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-haiku-4-5-20251001

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

logging:
  level:
    com.ecommerce.recommendation: DEBUG
